events {
    worker_connections 1024;
}

http {
    # Upstream for gate-arb frontend WS
    upstream gate_arb_ws {
        server gate-arb:8080;
        keepalive 32;
    }

    # Rate limiting for health endpoint
    limit_req_zone $binary_remote_addr zone=health:10m rate=10r/s;

    server {
        listen 8080;
        server_name _;

        # Redirect all HTTP → HTTPS in production
        # For Hetzner deployment behind a load balancer, this may not be needed.
        # Uncomment if running behind Cloudflare or directly exposed:
        # return 301 https://$host$request_uri;
    }

    # HTTPS server for gate-arb.111miniapp.com
    server {
        listen 8443 ssl;
        server_name gate-arb.111miniapp.com;

        # SSL certificates — volume-mount at /etc/nginx/certs/
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options          "SAMEORIGIN" always;

        # Health check endpoint (no auth required)
        location = /health {
            limit_req zone=health burst=5;
            proxy_pass http://gate_arb_ws;
            # Health checks are plain HTTP — don't try WS upgrade
            proxy_http_version 1.1;
        }

        # WebSocket dashboard — /ws path
        location /ws {
            proxy_pass http://gate_arb_ws;
            proxy_http_version 1.1;

            # WebSocket upgrade headers (REQUIRED)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WS timeouts — gate-arb is 24/7, keep alive
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # Buffering off for WS
            proxy_buffering off;
            proxy_cache off;
        }

        # Static dashboard frontend (if served by gate-arb)
        location / {
            proxy_pass http://gate_arb_ws;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
